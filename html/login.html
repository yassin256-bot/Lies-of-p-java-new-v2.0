<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion / Inscription</title>
  <style>
    /* ----------------- Reset & Body ----------------- */
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ----------------- Background Image ----------------- */
    body {
      background-image: url("https://images4.alphacoders.com/135/1355515.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }

    /* ----------------- Overlay Noir Semi-Transparent ----------------- */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.415);
      z-index: 0;
    }

    /* ----------------- Content Box ----------------- */
    .content {
      position: relative;
      z-index: 1; /* au-dessus de l'overlay */
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      color: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }

    input {
      font-size: 16px;
    }

    button {
      background-color: #007bff;
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    hr {
      border: 1px solid rgba(255,255,255,0.3);
      margin: 20px 0;
    }

    p {
      color: red;
      margin: 5px 0 0 0;
    }

    h2 {
      margin-bottom: 15px;
    }

  </style>
</head>
<body>

<div class="content">
  <h2>Connexion</h2>
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Mot de passe">
    <button type="submit">Se connecter</button>
    <p id="loginError"></p>
  </form>

  <hr>

  <h2>Inscription</h2>
  <form id="registerForm">
    <input type="text" id="registerName" placeholder="Nom">
    <input type="email" id="registerEmail" placeholder="Email">
    <input type="password" id="registerPassword" placeholder="Mot de passe">
    <input type="password" id="registerConfirm" placeholder="Confirmer le mot de passe">
    <button type="submit">S'inscrire</button>
    <p id="registerError"></p>
  </form>
</div>

<script src="script.js"></script>

<script>
  const loginForm = document.getElementById("loginForm");
  const registerForm = document.getElementById("registerForm");

  // Simulate login
  loginForm.addEventListener("submit", function(e) {
    e.preventDefault();
    const name = "Utilisateur"; // default name if not registering
    localStorage.setItem("userName", name);
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "iindex.html"; // redirect
  });

  // Simulate registration
  registerForm.addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("registerName").value || "Utilisateur";
    localStorage.setItem("userName", name);
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "iindex.html"; // redirect
  });
</script>
</body>
</html>
